<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BharatNet Service Readiness — North East India</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f1;
    color: #1a1410;
    height: 100vh;
    overflow: hidden;
}
.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px 24px 14px;
}
.header-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 4px;
}
h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
}
.subtitle {
    color: #6a6a6a;
    font-size: 13px;
    line-height: 1.5;
}
.subtitle span {
    background: #f0ece6;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #8a4a2e;
}
.main-area {
    display: flex;
    gap: 16px;
    flex: 1;
    min-height: 0;
}
.map-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}
#map {
    flex: 1;
    border-radius: 10px;
    border: 1px solid #e0ddd8;
    overflow: hidden;
    background: #eae8e3;
    min-height: 0;
}
.sidebar {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
}
.legend {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 14px 16px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    font-size: 12px;
    line-height: 1.6;
}
.legend h4 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 8px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
}
.legend-color {
    width: 18px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.08);
}
.info-panel {
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    padding: 14px 16px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    font-size: 13px;
    min-width: 220px;
    max-width: 280px;
    transition: opacity 0.2s;
}
.info-panel.hidden {
    opacity: 0;
    pointer-events: none;
}
.info-panel h4 {
    font-family: Georgia, serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
}
.info-panel .state-name {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
}
.info-panel .metric {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #f0ece6;
}
.info-panel .metric:last-child { border-bottom: none; }
.info-panel .metric-label { color: #666; }
.info-panel .metric-value { font-weight: 600; font-variant-numeric: tabular-nums; }
.info-panel .pct {
    font-family: Georgia, serif;
    font-size: 24px;
    font-weight: 700;
    margin: 6px 0;
}
.info-panel .pct-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.state-summary {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.state-card {
    background: #fff;
    border: 1px solid #e8e5e0;
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s;
}
.state-card:hover {
    transform: translateX(2px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.state-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 3px;
    background: var(--card-color);
}
.state-card .spct {
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    min-width: 58px;
    text-align: right;
}
.state-card .sinfo {
    flex: 1;
    min-width: 0;
}
.state-card .sname {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #555;
    line-height: 1.2;
}
.state-card .sdetail {
    font-size: 10px;
    color: #aaa;
    margin-top: 2px;
}
.source {
    font-size: 10px;
    color: #bbb;
    padding-top: 6px;
}
.controls-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 8px 0;
}
.toggle-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
}
.toggle-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 7px 14px;
    border: 1px solid #e0ddd8;
    border-radius: 20px;
    background: #fff;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
}
.toggle-btn:hover { border-color: #b8603e; color: #b8603e; }
.toggle-btn.active { background: #1a1410; color: #fff; border-color: #1a1410; }
.metric-note {
    font-size: 12px;
    line-height: 1.5;
    color: #555;
    padding: 8px 12px;
    background: #faf8f5;
    border-left: 3px solid #e0ddd8;
    border-radius: 0 6px 6px 0;
    display: none;
    flex: 1;
    min-width: 0;
}
.metric-note.visible { display: block; }
.metric-note strong { color: #1a1410; }
.metric-note .num { font-family: Georgia, serif; font-weight: 700; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="header-row">
        <h1>BharatNet in North East India</h1>
        <p class="subtitle">District-wise service readiness of Gram Panchayats <span>as on 06.12.2023</span></p>
    </div>
    <div class="controls-row">
        <div class="toggle-row">
            <button class="toggle-btn active" onclick="setMetric('pct')">% Service Ready (Official)</button>
            <button class="toggle-btn" onclick="setMetric('ofc')">Fibre (OFC) Only</button>
            <button class="toggle-btn" onclick="setMetric('gap')">Yet to Connect</button>
        </div>
        <div class="metric-note" id="metricNote"></div>
    </div>
    <div class="main-area">
        <div class="map-col">
            <div id="map"></div>
        </div>
        <div class="sidebar">
            <div class="state-summary" id="stateSummary"></div>
            <p class="source">Source: Dept. of Telecommunications, BharatNet GP data (06 Dec 2023).</p>
        </div>
    </div>
</div>

// ─── GeoJSON District Name → BharatNet Name Aliases ───
const DISTRICT_ALIASES = {
    // Arunachal Pradesh encoding issues (> = A in GeoJSON)
    '>NJ>W': 'ANJAW', 'CH>NGL>NG': 'CHANGLANG', 'DIB>NG VALLEY': 'DIBANG VALLEY',
    'LOWER DIB>NG VALLEY': 'LOWER DIBANG VALLEY', 'TIR>P': 'TIRAP', 'LEPA RADA': 'LEPARADA',
    'PAPUMPARE': 'PAPUM PARE',
    // Assam
    'DARANG': 'DARRANG', 'KAMRUP RURAL': 'KAMRUP', 'SIBSAGAR': 'SIVASAGAR',
    'SOUTH SALMARA': 'SOUTH SALMARA MANCACHAR', 'WEST KARBI ANAGLONG': 'WEST KARBI ANGLONG',
    // Manipur
    'KAMJANG': 'KAMJONG',
    // Meghalaya encoding issues
    'EAST G>RO HILLS': 'EAST GARO HILLS', 'EAST KH>SI HILLS': 'EAST KHASI HILLS',
    'NORTH G>RO HILLS': 'NORTH GARO HILLS', 'SOUTH G>RO HILLS': 'SOUTH GARO HILLS',
    'SOUTH WEST G>RO HILLS': 'SOUTH WEST GARO HILLS', 'SOUTH WEST KH>SI HILLS': 'SOUTH WEST KHASI HILLS',
    'WEST G>RO HILLS': 'WEST GARO HILLS', 'RI-BHOI': 'RI BHOI',
    'EASTERN WEST KHASI HILLS': 'SOUTH WEST KHASI HILLS',
    // Sikkim (new district names → old BharatNet names)
    'GANGTOK': 'EAST DISTRICT', 'GYALSHING': 'WEST DISTRICT', 'MANGAN': 'NORTH DISTRICT',
    'NAMCHI': 'SOUTH DISTRICT', 'PAKYONG': 'EAST DISTRICT', 'SORENG': 'WEST DISTRICT',
    // Tripura
    'GOMTI': 'GOMATI'
};

// ─── Color Scales ───
function getColorPct(pct) {
    if (pct === null) return '#d9d5cf';
    if (pct >= 90) return '#1a7a3a';
    if (pct >= 75) return '#3da34d';
    if (pct >= 60) return '#6bbe5a';
    if (pct >= 40) return '#f7c948';
    if (pct >= 20) return '#f5943b';
    return '#d43d2e';
}

function getColorGap(gap) {
    if (gap === null) return '#d9d5cf';
    if (gap === 0) return '#1a7a3a';
    if (gap <= 10) return '#3da34d';
    if (gap <= 30) return '#6bbe5a';
    if (gap <= 80) return '#f7c948';
    if (gap <= 200) return '#f5943b';
    return '#d43d2e';
}

function getColorSat(pct) {
    if (pct === null) return '#d9d5cf';
    if (pct >= 80) return '#1b4f72';
    if (pct >= 60) return '#2874a6';
    if (pct >= 40) return '#3498db';
    if (pct >= 20) return '#85c1e9';
    if (pct > 0) return '#d4e6f1';
    return '#f0ece6';
}

let currentMetric = 'pct';
let map, geoLayer, infoControl;

function lookupData(state, district) {
    const stateData = BHARATNET[state];
    if (!stateData) return null;
    // Direct match
    if (stateData[district]) return stateData[district];
    // Alias
    const alias = DISTRICT_ALIASES[district];
    if (alias && stateData[alias]) return stateData[alias];
    // Fuzzy: strip spaces/hyphens
    const norm = district.replace(/[\s\-]/g, '').toUpperCase();
    for (const [k, v] of Object.entries(stateData)) {
        if (k.replace(/[\s\-]/g, '').toUpperCase() === norm) return v;
    }
    return null;
}

function getValue(d) {
    if (!d) return null;
    if (currentMetric === 'pct') return Math.round((d.r / d.p) * 100);
    if (currentMetric === 'ofc') return d.p > 0 ? Math.round((d.ofc / d.p) * 100) : 0;
    if (currentMetric === 'gap') return d.g;
    return null;
}

function getColor(val) {
    if (currentMetric === 'pct') return getColorPct(val);
    if (currentMetric === 'ofc') return getColorPct(val);
    if (currentMetric === 'gap') return getColorGap(val);
    return '#d9d5cf';
}

function styleFeature(feature) {
    const state = feature.properties.STATE_UT;
    const district = feature.properties.DISTRICT;
    const d = lookupData(state, district);
    const val = getValue(d);
    return {
        fillColor: getColor(val),
        weight: 1,
        color: '#fff',
        fillOpacity: 0.85
    };
}

function fmtNum(n) {
    if (n == null) return '—';
    return n.toLocaleString('en-IN');
}

function setMetric(m) {
    currentMetric = m;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (geoLayer) geoLayer.setStyle(styleFeature);
    updateLegend();
    updateNote();
    buildSummary();
}

function updateNote() {
    const el = document.getElementById('metricNote');
    if (currentMetric === 'pct') {
        el.className = 'metric-note visible';
        el.innerHTML = 'The official "service ready" count bundles two very different technologies. <strong>OFC</strong> (optical fibre) delivers true broadband. <strong>Satellite</strong> uses geostationary VSAT links with ~<span class="num">600 ms</span> latency — unsuitable for video calls, real-time apps, or anything beyond basic browsing. Switch to <strong>Fibre (OFC) Only</strong> to see the real picture.';
    } else if (currentMetric === 'ofc') {
        el.className = 'metric-note visible';
        el.style.borderLeftColor = '#d43d2e';
        el.innerHTML = 'Stripping out satellite-connected Gram Panchayats reveals a far grimmer picture. Across the 8 NE states, only <span class="num">2,773</span> of <span class="num">11,497</span> Gram Panchayats (<span class="num">24%</span>) have actual fibre connectivity. The rest are either on high-latency satellite or not connected at all.';
    } else if (currentMetric === 'gap') {
        el.className = 'metric-note visible';
        el.style.borderLeftColor = '#f5943b';
        el.innerHTML = 'Absolute number of Gram Panchayats in each district that are <strong>not service ready</strong> under BharatNet — neither fibre nor satellite. Districts like Kangpokpi (<span class="num">440</span>), West Garo Hills (<span class="num">498</span>), and Churachandpur (<span class="num">336</span>) have the largest gaps.';
    } else {
        el.className = 'metric-note';
        el.style.borderLeftColor = '';
    }
}

function updateLegend() {
    if (!legendControl) return;
    const div = legendControl.getContainer();
    let html = '<h4>';
    if (currentMetric === 'pct') {
        html += '% Service Ready (OFC + Satellite)</h4>';
        html += leg('#1a7a3a','90–100%') + leg('#3da34d','75–90%') + leg('#6bbe5a','60–75%')
             + leg('#f7c948','40–60%') + leg('#f5943b','20–40%') + leg('#d43d2e','< 20%')
             + leg('#d9d5cf','No data');
    } else if (currentMetric === 'ofc') {
        html += '% on Fibre (OFC) Only</h4>';
        html += leg('#1a7a3a','90–100%') + leg('#3da34d','75–90%') + leg('#6bbe5a','60–75%')
             + leg('#f7c948','40–60%') + leg('#f5943b','20–40%') + leg('#d43d2e','< 20%')
             + leg('#d9d5cf','No data');
    } else {
        html += 'Yet to Connect</h4>';
        html += leg('#1a7a3a','0 (complete)') + leg('#3da34d','1–10') + leg('#6bbe5a','11–30')
             + leg('#f7c948','31–80') + leg('#f5943b','81–200') + leg('#d43d2e','200+')
             + leg('#d9d5cf','No data');
    }
    div.innerHTML = html;
}

function leg(color, label) {
    return `<div class="legend-item"><div class="legend-color" style="background:${color}"></div>${label}</div>`;
}

function buildSummary() {
    const el = document.getElementById('stateSummary');
    const states = Object.keys(BHARATNET).sort((a,b) => {
        const pa = stateAgg(a), pb = stateAgg(b);
        if (currentMetric === 'pct') return pb.pct - pa.pct;
        if (currentMetric === 'ofc') return pb.ofcPct - pa.ofcPct;
        if (currentMetric === 'gap') return pa.gap - pb.gap;
        return 0;
    });
    el.innerHTML = states.map(s => {
        const a = stateAgg(s);
        const color = currentMetric === 'pct' ? getColorPct(a.pct)
            : currentMetric === 'ofc' ? getColorPct(a.ofcPct) : getColorGap(a.gap);
        const val = currentMetric === 'pct' ? `${a.pct}%`
            : currentMetric === 'ofc' ? `${a.ofcPct}%` : fmtNum(a.gap);
        const detail = currentMetric === 'pct' ? `${fmtNum(a.ready)} of ${fmtNum(a.planned)}`
            : currentMetric === 'ofc' ? `${fmtNum(a.ofc)} of ${fmtNum(a.planned)}` : `of ${fmtNum(a.planned)} total`;
        const name = s.split(' ').map(w => w.charAt(0) + w.slice(1).toLowerCase()).join(' ');
        return `<div class="state-card" style="--card-color:${color}">
            <div class="spct" style="color:${color}">${val}</div>
            <div class="sinfo">
                <div class="sname">${name}</div>
                <div class="sdetail">${detail}</div>
            </div>
        </div>`;
    }).join('');
}

function stateAgg(state) {
    const ds = Object.values(BHARATNET[state]);
    const planned = ds.reduce((s,d) => s+d.p, 0);
    const ready = ds.reduce((s,d) => s+d.r, 0);
    const gap = ds.reduce((s,d) => s+d.g, 0);
    const ofc = ds.reduce((s,d) => s+d.ofc, 0);
    const sat = ds.reduce((s,d) => s+d.sat, 0);
    return { planned, ready, gap, ofc, sat, pct: Math.round(ready/planned*100), ofcPct: Math.round(ofc/planned*100) };
}

let legendControl;

async function init() {
    map = L.map('map', {
        preferCanvas: true,
        zoomSnap: 0.25,
        minZoom: 5,
        maxZoom: 10,
        attributionControl: false
    }).setView([25.5, 93], 6);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap, &copy; CARTO',
        maxZoom: 12
    }).addTo(map);

    // Labels on top
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        maxZoom: 12,
        pane: 'overlayPane'
    }).addTo(map);

    // Legend
    legendControl = L.control({ position: 'bottomright' });
    legendControl.onAdd = () => {
        const div = L.DomUtil.create('div', 'legend');
        return div;
    };
    legendControl.addTo(map);
    updateLegend();

    // Info panel (hidden until hover)
    infoControl = L.control({ position: 'topright' });
    infoControl.onAdd = () => {
        const div = L.DomUtil.create('div', 'info-panel hidden');
        return div;
    };
    infoControl.addTo(map);

    // Load embedded GeoJSON
    try {
        const geoData = NE_GEOJSON;

        geoLayer = L.geoJSON(geoData, {
            style: styleFeature,
            onEachFeature: (feature, layer) => {
                layer.on('mouseover', function(e) {
                    this.setStyle({ weight: 2.5, color: '#1a1410' });
                    this.bringToFront();
                    showInfo(feature.properties);
                });
                layer.on('mouseout', function(e) {
                    geoLayer.resetStyle(this);
                    hideInfo();
                });
            }
        }).addTo(map);

        map.fitBounds(geoLayer.getBounds(), { padding: [20, 20], maxZoom: 6.5 });
        buildSummary();
        updateNote();
    } catch(e) {
        console.error('Failed to load GeoJSON:', e);
        document.getElementById('map').innerHTML = '<p style="padding:40px;text-align:center;color:#888;">Failed to load map data. Make sure DISTRICT_BOUNDARY.geojson is accessible.</p>';
    }
}

function showInfo(props) {
    const state = props.STATE_UT;
    const district = props.DISTRICT;
    const d = lookupData(state, district);
    const panel = infoControl.getContainer();
    panel.classList.remove('hidden');

    // Display name: fix encoding
    let displayName = district.replace(/>/g, 'A');
    displayName = displayName.split(' ').map(w => w.charAt(0) + w.slice(1).toLowerCase()).join(' ');
    const stateName = state.split(' ').map(w => w.charAt(0) + w.slice(1).toLowerCase()).join(' ');

    if (!d) {
        panel.innerHTML = `<h4>${displayName}</h4><div class="state-name">${stateName}</div><div class="hint">No BharatNet data available</div>`;
        return;
    }

    const pct = Math.round((d.r / d.p) * 100);
    const satPct = d.p > 0 ? Math.round((d.sat / d.p) * 100) : 0;
    const ofcPct = d.p > 0 ? Math.round((d.ofc / d.p) * 100) : 0;
    const pctColor = getColorPct(pct);

    panel.innerHTML = `
        <h4>${displayName}</h4>
        <div class="state-name">${stateName}</div>
        <div class="pct" style="color:${pctColor}">${pct}%</div>
        <div class="pct-label">Service Ready</div>
        <div style="margin-top:8px">
            <div class="metric"><span class="metric-label">Total Planned</span><span class="metric-value">${fmtNum(d.p)}</span></div>
            <div class="metric"><span class="metric-label">Service Ready</span><span class="metric-value">${fmtNum(d.r)}</span></div>
            <div class="metric"><span class="metric-label">via OFC</span><span class="metric-value">${fmtNum(d.ofc)} (${ofcPct}%)</span></div>
            <div class="metric"><span class="metric-label">via Satellite</span><span class="metric-value">${fmtNum(d.sat)} (${satPct}%)</span></div>
            <div class="metric"><span class="metric-label">Yet to Connect</span><span class="metric-value" style="color:#d43d2e">${fmtNum(d.g)}</span></div>
        </div>
    `;
}

function hideInfo() {
    infoControl.getContainer().classList.add('hidden');
}

init();
</script>
</body>
</html>
